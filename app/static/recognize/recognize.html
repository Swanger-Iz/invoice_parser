<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Распознавание — Invoice AI</title>
  <link rel="stylesheet" href="/static/global.css" />
  <link rel="stylesheet" href="/static/recognize/recognize.css" />
</head>
<body>

<nav class="nav">
  <span class="nav-brand">invoice<span>_</span>ai</span>
  <div class="nav-links">
    <a href="/"           class="nav-link">Главная</a>
    <a href="/recognize"  class="nav-link">Распознавание</a>
    <a href="/requests"   class="nav-link">Запросы</a>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <p class="label">распознавание</p>
    <h2>Загрузить документ</h2>
  </div>

  <div class="card upload-card" id="uploadCard">
    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">↑</div>
      <p class="drop-text">Перетащите файл или <label for="fileInput" class="file-label">выберите изображение</label></p>
      <p class="label">JPG, JPEG, PNG · до 20 МБ</p>
      <input type="file" id="fileInput" accept=".jpg,.jpeg,.png" hidden />
    </div>

    <div class="preview-wrap" id="previewWrap" hidden>
      <div class="preview-img-wrap">
        <img id="previewImg" alt="preview" style="display:none" />
        <div class="preview-placeholder" id="previewPlaceholder">
          <span>🖼</span>
        </div>
      </div>
      <div class="preview-meta">
        <span id="previewName" class="label"></span>
        <button class="btn btn-ghost btn-sm" id="clearBtn">Удалить</button>
      </div>
    </div>

    <div class="upload-footer">
      <button class="btn btn-primary" id="submitBtn" disabled>
        Распознать
      </button>
    </div>
  </div>
</div>

<script src="/static/global.js"></script>
<script src="/static/recognize/recognize.js"></script>
</body>
</html>
