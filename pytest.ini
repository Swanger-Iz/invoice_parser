[pytest]

pythonpath = invoice_ai app

env_override_existing_values = 1
env_files = 
    .env.test

markers =
    pages: tests for page routes
    requests: tests for requests endpoints
    get_fio: tests for get_fio endpoint
    get_fio_bt: tests for get_fio background task

filterwarnings =
    ignore::UserWarning:paddle.*